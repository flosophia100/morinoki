<body class="page-room">

<!-- 左常駐パネル -->
<aside id="info-panel" class="info-panel">
  <div id="info-content" class="info-content"></div>
</aside>

<header class="room-header">
  <span id="forest-name" class="forest-name">森</span>
  <div class="room-header-right">
    <span id="forest-count" class="forest-count">0本の樹</span>
    <button id="share-btn" class="btn-icon" title="森のURLを共有">↗</button>
    <button id="restore-btn" class="btn-icon" title="樹を復元" aria-label="樹を復元">⚘</button>
  </div>
</header>

<div class="forest-container">
  <canvas id="forest-canvas"></canvas>
</div>

<footer class="room-footer">
  <button id="plant-btn" class="btn-plant" data-mode="plant">+ 樹を植える</button>
</footer>

<!-- 植樹モーダル(フローティング) -->
<div id="plant-modal" class="modal hidden">
  <div class="modal-panel">
    <h2>樹を植える</h2>
    <label>名前 <input id="plant-name" type="text" maxlength="20" required></label>
    <label>合言葉(4〜10桁) <input id="plant-pass" type="password" minlength="4" maxlength="10" required></label>
    <label>合言葉(確認) <input id="plant-pass2" type="password" minlength="4" maxlength="10" required></label>
    <label>メール(任意・復元用) <input id="plant-email" type="email"></label>
    <div class="modal-actions">
      <button id="plant-cancel" class="btn-secondary">キャンセル</button>
      <button id="plant-submit" class="btn-primary">植える</button>
    </div>
    <p id="plant-error" class="error hidden"></p>
  </div>
</div>

<!-- 共有モーダル -->
<div id="share-modal" class="modal hidden">
  <div class="modal-panel">
    <h2>森を共有する</h2>
    <p class="hint">このURLを仲間に伝えると、同じ森に入れます。</p>
    <code id="share-url"></code>
    <div id="share-qr" class="share-qr"></div>
    <div class="modal-actions">
      <button id="share-close" class="btn-secondary">閉じる</button>
      <button id="share-copy" class="btn-primary">URLをコピー</button>
    </div>
  </div>
</div>

<!-- 復元モーダル -->
<div id="restore-modal" class="modal hidden">
  <div class="modal-panel">
    <h2>樹を復元する</h2>
    <p class="hint">別の端末から戻ってきた or 合言葉を忘れた場合に。</p>
    <label>名前 <input id="restore-name" type="text" maxlength="20" placeholder="植えたときの名前" required></label>
    <label>合言葉 または 復元キー <input id="restore-secret" type="text" placeholder="4桁 or 復元キー" required></label>
    <p class="hint" style="font-size:0.76rem">合言葉(4桁)か、植樹直後に表示された英数字の復元キー どちらでもOK</p>
    <div class="modal-actions">
      <button id="restore-cancel" class="btn-secondary">キャンセル</button>
      <button id="restore-submit" class="btn-primary">復元する</button>
    </div>
    <p id="restore-error" class="error hidden"></p>
  </div>
</div>

<!-- 復元キー表示 -->
<div id="recovery-modal" class="modal hidden">
  <div class="modal-panel">
    <h2>復元キー</h2>
    <p class="hint">合言葉を忘れたときに使います。必ず控えてください(この画面でしか表示されません)。</p>
    <code id="recovery-key"></code>
    <div class="modal-actions">
      <button id="recovery-copy" class="btn-secondary">コピー</button>
      <button id="recovery-ok" class="btn-primary">保存した</button>
    </div>
  </div>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
