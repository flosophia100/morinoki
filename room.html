<body class="page-room">

<!-- 左常駐パネル -->
<aside id="info-panel" class="info-panel">
  <div id="info-content" class="info-content"></div>
</aside>

<header class="room-header">
  <div class="room-header-left">
    <button id="panel-toggle" class="btn-icon" title="パネル表示切替" aria-label="パネル表示切替">≡</button>
    <span id="forest-name" class="forest-name">morinokki</span>
  </div>
  <div class="room-header-right">
    <span id="weather-badge" class="weather-badge" title="岐阜県美濃市 現在の天気">—</span>
    <span id="room-clock" class="room-clock" aria-label="現在時刻">--:--:--</span>
    <span id="forest-count" class="forest-count">0本の樹</span>
    <span id="node-count" class="node-count">0本の枝</span>
  </div>
</header>

<div class="forest-container">
  <canvas id="forest-canvas"></canvas>
</div>

<!-- タイムラプスコントロール(画面下中央・フッタ上) -->
<div id="timelapse-bar" class="timelapse-bar hidden">
  <button id="tl-play" class="btn-icon" title="再生">▶</button>
  <input id="tl-slider" type="range" min="0" max="1000" value="0">
  <span id="tl-label" class="tl-label">--</span>
  <button id="tl-close" class="btn-icon" title="閉じる">×</button>
</div>

<!-- 復元キー表示 -->
<div id="recovery-modal" class="modal hidden">
  <div class="modal-panel">
    <h2>復元キー</h2>
    <p class="hint">合言葉を忘れたときに使います。必ず控えてください(この画面でしか表示されません)。</p>
    <code id="recovery-key"></code>
    <div class="modal-actions">
      <button id="recovery-copy" class="btn-secondary">コピー</button>
      <button id="recovery-ok" class="btn-primary">保存した</button>
    </div>
  </div>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
